# Auto-deploy on push to main: build image, push to GHCR, write .env from Actions secrets, pull + up on server.
# Secrets DATABASE_URL, TMDB_API_KEY, NEXTAUTH_SECRET, NEXTAUTH_URL must be set in the repo — they sync to the server each deploy.
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Run manually from Actions tab

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Middleware (Edge) bakes NEXTAUTH_* at build — must match runtime .env or sessions break.
          build-args: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_REGION: ${{ secrets.S3_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,TMDB_API_KEY,NEXTAUTH_SECRET,NEXTAUTH_URL,S3_BUCKET_NAME,S3_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e
            # docker-compose-plugin is only in Docker's apt repo on many systems; fallback = official v2 binary
            install_compose_v2_binary() {
              ARCH=$(uname -m)
              case "$ARCH" in
                x86_64) CARCH="x86_64" ;;
                aarch64|arm64) CARCH="aarch64" ;;
                *) echo "ERROR: Unsupported arch for Compose binary: $ARCH"; exit 1 ;;
              esac
              COMPOSE_VER="v2.32.2"
              echo "Installing Docker Compose ${COMPOSE_VER} CLI plugin from GitHub..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-${CARCH}" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            }
            if ! docker compose version >/dev/null 2>&1; then
              echo "Docker Compose v2 not found — trying apt/yum, then GitHub binary..."
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -qq
                sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-plugin || true
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y docker-compose-plugin || true
              fi
            fi
            if ! docker compose version >/dev/null 2>&1; then
              install_compose_v2_binary
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose still unavailable."
              exit 1
            fi
            cd ${{ secrets.DEPLOY_PATH }}
            export DOCKER_IMAGE=$(echo "${{ env.REGISTRY }}/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]')
            umask 077
            printf '%s\n' \
              "DOCKER_IMAGE=${DOCKER_IMAGE}" \
              "DATABASE_URL=${DATABASE_URL}" \
              "TMDB_API_KEY=${TMDB_API_KEY}" \
              "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}" \
              "NEXTAUTH_URL=${NEXTAUTH_URL}" \
              "AUTH_TRUST_HOST=true" \
              "RUN_MIGRATE=1" \
              "S3_BUCKET_NAME=${S3_BUCKET_NAME}" \
              "S3_REGION=${S3_REGION}" \
              "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" \
              "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" \
              > .env
            # GHCR requires login even for public images. Add repo secret GHCR_PULL_TOKEN (PAT with read:packages).
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Old :latest becomes untagged (<none>) after each pull — prune frees disk (layers still shared).
            docker image prune -f
