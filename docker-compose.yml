version: '3.8'
services:
  app:
    build:
      context: .
      args:
        - DATABASE_URL=${DATABASE_URL:-file:./data/dev.db}
        - TMDB_API_KEY=${TMDB_API_KEY}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    image: streamy:latest
    ports:
      - "80:3000"
    restart: always
    # Load env at runtime from .env in same directory as docker-compose.yml
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-file:./data/dev.db}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    volumes:
      # Persist SQLite DB (match path in DATABASE_URL)
      - streamy-data:/app/data
volumes:
  streamy-data: