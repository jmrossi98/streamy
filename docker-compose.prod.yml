# Server: copy this file + a .env next to it (see docs/deploy-env.md).
# DOCKER_IMAGE must match your GHCR image (lowercase).
# (Compose v2+ — no top-level `version` key; it is obsolete.)
services:
  app:
    image: ${DOCKER_IMAGE:-streamy:latest}
    ports:
      - "80:3000"
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
      # Migrations on startup (idempotent). Set RUN_MIGRATE=0 only if you run migrate separately.
      - RUN_MIGRATE=${RUN_MIGRATE:-1}
      # SQLite path inside container; volume streamy-data is mounted at /app/data
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/prod.db}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      # Same as trustHost: true (not on NextAuthOptions type in next-auth v4 typings)
      - AUTH_TRUST_HOST=true
    volumes:
      - streamy-data:/app/data
volumes:
  streamy-data:
